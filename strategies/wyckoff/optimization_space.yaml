# optimization_space.yaml — Wyckoff Breakout

objective: "sharpe_penalized"
# sharpe_penalized = Sharpe * (1 - DD/0.15) * log10(max(trades, 1))
# Không dùng net_profit đơn thuần

reject_trial_if:
  total_trades_lt:  200
  profit_factor_lt: 1.15
  max_dd_gt:        0.15
  sharpe_lt:        0.5
  expectancy_lte:   0.0

parameters:
  - name: "RangeLookback"
    type: "int"
    min: 10
    max: 40
    step: 5

  - name: "RangeMinATR"
    type: "float"
    min: 0.5
    max: 2.0
    step: 0.5

  - name: "SpringATRBuffer"
    type: "float"
    min: 0.1
    max: 0.5
    step: 0.1

  - name: "EMA_Period"
    type: "int"
    min: 13
    max: 34
    step: 4

  - name: "PullbackATRTol"
    type: "float"
    min: 0.1
    max: 0.5
    step: 0.1

  - name: "SL_MaxATR"
    type: "float"
    min: 2.0
    max: 4.0
    step: 0.5

  - name: "TP_RR"
    type: "float"
    min: 1.5
    max: 3.0
    step: 0.5

  - name: "SignalExpiryBars"
    type: "int"
    min: 4
    max: 16
    step: 4

walk_forward:
  train_months: 12
  test_months:  3
  min_folds:    4
  oos_pass_ratio: 0.5

stability:
  method: "plateau"
  plateau_tolerance_pct: 10
  cluster_n: 5

output:
  best_params_file: "best_params.json"
  report_file:      "optimization_report.md"
  include_timestamp_in_best_params: true
